openapi: "3.0.3"
info:
  title: "Application API"
  description: "Application API"
  version: "1.0.0"
servers:
  - url: "https://tsm-input-dolly.intern.dev.nav.no"
  - url: "http://tsm-input-dolly.tsm"
paths:
  /api/sykmelding:
    post:
      operationId: opprettSykmelding
      tags:
        - Sykmelding
      summary: Opprett sykmelding
      requestBody:
        $ref: '#/components/requestBodies/SykmeldingBody'
      responses:
        '200':
          $ref: '#/components/responses/SykmeldingResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /api/sykmelding/{sykmeldingId}:
    parameters:
      - name: sykmeldingId
        in: path
        required: true
        schema:
          type: string
        description: SykmeldingId
    get:
      operationId: getSykmeldingById
      summary: Get sykmelding by id
      responses:
        '200':
          $ref: '#/components/responses/SykmeldingResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /api/sykmelding/ident:
    parameters:
      - name: X-ident
        in: header
        required: true
        schema:
          $ref: '#/components/schemas/Ident'
        description: Ident
    get:
      operationId: getSykmeldingerByIdent
      summary: Get sykmeldinger by ident (FNR or DNR)
      responses:
        '200':
          $ref: '#/components/responses/SykmeldingerResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      parameters:
        - name: X-ident
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/Ident'
          description: Ident
      operationId: deleteSykmeldingerByIdent
      summary: Delete sykmeldinger by ident (FNR or DNR)
      responses:
        '200':
          description: OK
        '500':
          $ref: '#/components/responses/ErrorResponse'

components:
  requestBodies:
    SykmeldingBody:
      description: "Opprett sykmelding"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Sykmelding'
          examples:
            vanlig_100_prosent:
              summary: Vanlig sykmelding, 100% (uten grad)
              value:
                type: VANLIG
                ident: "12345678912"
                aktivitet:
                  - fom: "2025-09-01"
                    tom: "2025-09-14"
            vanlig_gradert:
              summary: Vanlig sykmelding, gradert 50%
              value:
                type: VANLIG
                ident: "12345678912"
                aktivitet:
                  - fom: "2025-09-01"
                    tom: "2025-09-14"
                    grad: 50
            vanlig_gradert_med_reisetilskudd:
              summary: Vanlig sykmelding, gradert 50% med reisetilskudd
              value:
                type: VANLIG
                ident: "12345678912"
                aktivitet:
                  - fom: "2025-09-01"
                    tom: "2025-09-14"
                    grad: 50
                    reisetilskudd: true
            vanlig_flere_perioder:
              summary: Vanlig sykmelding med flere perioder
              value:
                type: VANLIG
                ident: "12345678912"
                aktivitet:
                  - fom: "2025-09-01"
                    tom: "2025-09-14"
                  - fom: "2025-09-15"
                    tom: "2025-09-30"
                    grad: 50
            avventende:
              summary: Avventende sykmelding
              value:
                type: AVVENTENDE
                ident: "12345678912"
                aktivitet:
                  - fom: "2025-09-01"
                    tom: "2025-09-14"
            behandlingsdager:
              summary: Sykmelding med behandlingsdager
              value:
                type: BEHANDLINGSDAGER
                ident: "12345678912"
                aktivitet:
                  - fom: "2025-09-01"
                    tom: "2025-09-14"
            reisetilskudd:
              summary: Reisetilskudd (standalone)
              value:
                type: REISETILSKUDD
                ident: "12345678912"
                aktivitet:
                  - fom: "2025-09-01"
                    tom: "2025-09-14"
  responses:
    ErrorResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundResponse'
      description: "Sykmelding not found"
    SykmeldingResponse:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SykmeldingResponse'
      description: "Response with sykmeldingId"
    SykmeldingerResponse:
      description: "List of sykmeldinger"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SykmeldingerResponse'
  schemas:
    NotFoundResponse:
      type: object
      properties:
        message:
          type: string
    Date:
      type: string
      format: date
    SykmeldingId:
      type: string
    Ident:
      type: string
      pattern: "^[0-9]{11}$"
      example: "62858801562"
      description: "FNR eller DNR"
    SykmeldingType:
      type: string
      enum:
        - VANLIG
        - AVVENTENDE
        - BEHANDLINGSDAGER
        - REISETILSKUDD
      description: >
        Type sykmelding. `VANLIG` støtter én eller flere aktiviteter (gradert og/eller
        ikke-mulig, evt. med reisetilskudd). `AVVENTENDE`, `BEHANDLINGSDAGER` og
        `REISETILSKUDD` er standalone typer med én enkelt aktivitet.
    Grad:
      type: integer
      minimum: 1
      maximum: 99
      description: >
        Grad av sykmelding i prosent (1-99). Uten grad tolkes aktiviteten som 100% sykmeldt.
        Kun gyldig for `VANLIG` sykmelding.
    Aktivitet:
      type: object
      description: >
        En aktivitet i en sykmelding. For `VANLIG` sykmelding kan `grad` være satt (1-99)
        for gradert sykmelding, ellers regnes aktiviteten som 100% sykmeldt. `reisetilskudd`
        kan kun settes sammen med `grad`. For de andre sykmeldingstypene skal `grad` og
        `reisetilskudd` ikke settes.
      required:
        - fom
        - tom
      properties:
        fom:
          $ref: '#/components/schemas/Date'
        tom:
          $ref: '#/components/schemas/Date'
        grad:
          $ref: '#/components/schemas/Grad'
        reisetilskudd:
          type: boolean
          default: false
          description: Reisetilskudd i tillegg til gradert sykmelding. Krever at `grad` er satt.
      example:
        fom: "2025-09-01"
        tom: "2025-09-14"
        grad: 50
    Sykmelding:
      type: object
      description: >
        Request for å opprette en sykmelding. `type` bestemmer hvordan `aktivitet`-listen
        tolkes:

        - `VANLIG`: én eller flere aktiviteter. Hver aktivitet kan være 100% (uten grad)
          eller gradert (med grad 1-99). Gradert aktivitet kan i tillegg ha
          `reisetilskudd = true`.
        - `AVVENTENDE`: nøyaktig én aktivitet.
        - `BEHANDLINGSDAGER`: nøyaktig én aktivitet.
        - `REISETILSKUDD`: nøyaktig én aktivitet.

        `grad` og `reisetilskudd` på en aktivitet kan kun brukes for `VANLIG`.
      required:
        - type
        - ident
        - aktivitet
      properties:
        type:
          $ref: '#/components/schemas/SykmeldingType'
        ident:
          $ref: '#/components/schemas/Ident'
        aktivitet:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Aktivitet'
    SykmeldingResponse:
      type: object
      description: >
        Respons når en sykmelding opprettes eller hentes. Samme form som `Sykmelding` med
        et ekstra `sykmeldingId`-felt.
      required:
        - sykmeldingId
        - type
        - ident
        - aktivitet
      properties:
        sykmeldingId:
          $ref: '#/components/schemas/SykmeldingId'
        type:
          $ref: '#/components/schemas/SykmeldingType'
        ident:
          $ref: '#/components/schemas/Ident'
        aktivitet:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Aktivitet'
    SykmeldingerResponse:
      type: object
      properties:
        sykmeldinger:
          type: array
          items:
            $ref: '#/components/schemas/SykmeldingResponse'
